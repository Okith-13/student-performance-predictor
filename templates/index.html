<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Performance Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --text:     #e8eaf6;
      --muted:    #7880a0;
      --danger:   #ff5e7e;
      --warning:  #ffb347;
      --success:  #00d4aa;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; }

    .container {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .form-col { grid-column: 1 / -1; }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .field input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .field .value-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent2);
      margin-top: 4px;
    }

    .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button#predict-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #9b59b6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 24px;
      letter-spacing: 0.04em;
    }
    button#predict-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    button#predict-btn:active { transform: translateY(0); }

    /* Result card */
    #result-card { display: none; grid-column: 1 / -1; }

    .score-big {
      font-family: 'JetBrains Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent2);
      line-height: 1;
    }
    .grade-badge {
      display: inline-block;
      font-size: 2rem;
      font-weight: 700;
      padding: 6px 20px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      margin-left: 16px;
      vertical-align: middle;
    }

    .risk-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 12px;
    }
    .risk-Low    { background: rgba(0,212,170,0.15); color: var(--success); }
    .risk-Medium { background: rgba(255,179,71,0.15); color: var(--warning); }
    .risk-High   { background: rgba(255,94,126,0.15); color: var(--danger); }

    .probs { margin-top: 20px; }
    .probs h3 { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .prob-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .prob-bar .lbl { width: 20px; font-weight: 700; font-size: 0.9rem; }
    .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s ease; }
    .prob-bar .pct { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--muted); width: 42px; text-align: right; }

    .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 12px; display: none; }

    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
      .fields-grid { grid-template-columns: 1fr; }
      .form-col, #result-card { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎓 Student Performance Predictor</h1>
  <p>Predict exam score & grade using study habits and attendance data</p>
</header>

<div class="container">
  <!-- Input Form -->
  <div class="card form-col">
    <h2>Student Input Features</h2>
    <div class="fields-grid">

      <div class="field">
        <label>Study Hours / Day</label>
        <input type="range" id="study_hours" min="0" max="12" step="0.5" value="5">
        <div class="value-display"><span id="study_hours_val">5</span> hrs</div>
      </div>

      <div class="field">
        <label>Attendance Rate</label>
        <input type="range" id="attendance_rate" min="0" max="100" step="1" value="80">
        <div class="value-display"><span id="attendance_rate_val">80</span>%</div>
      </div>

      <div class="field">
        <label>Sleep Hours / Night</label>
        <input type="range" id="sleep_hours" min="3" max="10" step="0.5" value="7">
        <div class="value-display"><span id="sleep_hours_val">7</span> hrs</div>
      </div>

      <div class="field">
        <label>Assignments Completed</label>
        <input type="range" id="assignments_completed" min="0" max="100" step="1" value="80">
        <div class="value-display"><span id="assignments_completed_val">80</span>%</div>
      </div>

      <div class="field">
        <label>Previous GPA</label>
        <input type="range" id="previous_gpa" min="0" max="4" step="0.1" value="3.0">
        <div class="value-display"><span id="previous_gpa_val">3.0</span> / 4.0</div>
      </div>

      <div class="field">
        <label>Extracurricular Hours / Week</label>
        <input type="range" id="extracurricular_hours" min="0" max="20" step="0.5" value="3">
        <div class="value-display"><span id="extracurricular_hours_val">3</span> hrs</div>
      </div>

      <div class="field">
        <label>Tutoring Sessions / Month</label>
        <input type="range" id="tutoring_sessions" min="0" max="10" step="1" value="2">
        <div class="value-display"><span id="tutoring_sessions_val">2</span> sessions</div>
      </div>

      <div class="field">
        <label>Parent Education Level</label>
        <select id="parent_education_level">
          <option value="0">0 — No formal education</option>
          <option value="1">1 — High School</option>
          <option value="2" selected>2 — Bachelor's Degree</option>
          <option value="3">3 — Postgraduate</option>
        </select>
      </div>

    </div>
    <button id="predict-btn" onclick="runPrediction()">⚡ Predict Performance</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Result -->
  <div class="card" id="result-card">
    <h2>Prediction Result</h2>
    <div>
      <span class="score-big" id="res-score">—</span>
      <span class="grade-badge" id="res-grade">—</span>
    </div>
    <div><span class="risk-tag" id="res-risk"></span></div>

    <div class="probs" id="probs-section">
      <h3>Grade Probabilities</h3>
      <div id="prob-bars"></div>
    </div>
  </div>

</div>

<script>
  // Wire up sliders
  document.querySelectorAll('input[type=range]').forEach(input => {
    const valEl = document.getElementById(input.id + '_val');
    input.addEventListener('input', () => { valEl.textContent = input.value; });
  });

  async function runPrediction() {
    const btn = document.getElementById('predict-btn');
    const errEl = document.getElementById('error-msg');
    btn.textContent = '⏳ Predicting…';
    btn.disabled = true;
    errEl.style.display = 'none';

    const payload = {
      study_hours_per_day:    parseFloat(document.getElementById('study_hours').value),
      attendance_rate:        parseFloat(document.getElementById('attendance_rate').value),
      sleep_hours:            parseFloat(document.getElementById('sleep_hours').value),
      assignments_completed:  parseFloat(document.getElementById('assignments_completed').value),
      previous_gpa:           parseFloat(document.getElementById('previous_gpa').value),
      extracurricular_hours:  parseFloat(document.getElementById('extracurricular_hours').value),
      tutoring_sessions:      parseFloat(document.getElementById('tutoring_sessions').value),
      parent_education_level: parseInt(document.getElementById('parent_education_level').value),
    };

    try {
      const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();

      if (!res.ok || !json.success) {
        throw new Error(json.error || 'Prediction failed');
      }

      const d = json.data;
      document.getElementById('res-score').textContent = d.predicted_score;
      document.getElementById('res-grade').textContent = d.predicted_grade;

      const riskEl = document.getElementById('res-risk');
      riskEl.textContent = `${d.risk_level} Risk`;
      riskEl.className = `risk-tag risk-${d.risk_level}`;

      // Probability bars
      const barsEl = document.getElementById('prob-bars');
      barsEl.innerHTML = '';
      ['A','B','C','D','F'].forEach(grade => {
        const pct = d.grade_probabilities[grade] ?? 0;
        barsEl.innerHTML += `
          <div class="prob-bar">
            <span class="lbl">${grade}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span class="pct">${pct}%</span>
          </div>`;
      });

      document.getElementById('result-card').style.display = 'block';
    } catch(err) {
      errEl.textContent = '⚠️ ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.textContent = '⚡ Predict Performance';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
